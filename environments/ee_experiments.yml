# Environment for Experiment Execution
#
# This environment is specifically designed for running experiment programs
# in the experiments/ directory. It includes PsychoPy and related packages
# for emotion research experiments with fNIRS recording capabilities.
#
# IMPORTANT: Some dependency packages have been manually modified for this project.
# These modifications are documented in experiments/utils_exp.py comments and are
# essential for proper functioning. Key modifications include:
#
# 1. psychopy.hardware.camera (line 570): Modified _bufferSecs mechanism to make
#    bufferSecs parameter work properly
# 2. moviepy.video.VideoClip.write_video_file method: Added fps default value
#    handling to fix audio merging bug
#
# After environment setup, apply these modifications to the installed packages
# as documented in experiments/utils_exp.py.

name: ee_experiments
